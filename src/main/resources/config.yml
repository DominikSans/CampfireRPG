# ============================================================
# CampfireRPG - Main Configuration
# ============================================================
# Este archivo fue reorganizado para que sea mas facil de leer.
# Las opciones viejas siguen siendo compatibles en el codigo,
# pero desde ahora conviene editar esta nueva estructura.

language:
  # Idiomas disponibles por defecto: EN, ES
  default: EN

timers:
  # Cada cuantos ticks se actualizan las auras.
  aura-interval-ticks: 40

  # Cada cuantos ticks se reescanean los chunks cargados
  # para encontrar campfires activos.
  registry-rescan-interval-ticks: 600

activation:
  night:
    # Si es true, las fogatas solo funcionan de noche.
    only-at-night: true
    start-tick: 13000
    end-tick: 23000

  requirements:
    # Minimo de jugadores cerca para activar la fogata.
    required-players: 2

    # Jugadores necesarios para activar el bonus heroico.
    bonus-threshold: 4

    # Radio donde se debilitan monstruos cercanos.
    monster-ward-radius: 8.0

  rest:
    # Cuantos ciclos deben pasar para entregar el bonus rested.
    rest-cycles-required: 6

    # Cooldown entre recompensas de rested.
    rest-reward-cooldown-ticks: 3600

gameplay:
  support:
    experience-pulse:
      enabled: true
      amount: 3
      cooldown-ticks: 200

    cleanse:
      enabled: true
      cooldown-ticks: 200

    shared-heal:
      enabled: true
      amount: 1.0
      cooldown-ticks: 120

integrations:
  hooks:
    placeholderapi: true
    worldguard: false
    clans: true

  groups:
    # Base mode no depende de grupos externos.
    # Activalo solo si quieres condicionar la fogata a clanes/parties/factions.
    require-same-group-for-activation: false

    # Si es false, el bonus heroico usa solo la cantidad de jugadores cercanos.
    use-group-size-for-hero-bonus: true

restrictions:
  worlds:
    # Si allowed tiene mundos, solo funcionara en esos.
    allowed: []
    blocked: []

  regions:
    # Requiere WorldGuard para surtir efecto.
    allowed: []
    blocked: []

classes:
  # Sistema interno de clases del plugin.
  enabled: false
  default: adventurer

  types:
    adventurer:
      display-name: "&6Adventurer"
      permission: "campfirerpg.class.adventurer"
      description: "&7Equilibrado y versatil."
      global-effects: {}
      normal-effects:
        speed:
          type: SPEED
          amplifier: 0
          duration-ticks: 100
      soul-effects:
        luck:
          type: LUCK
          amplifier: 0
          duration-ticks: 120

    warrior:
      display-name: "&cWarrior"
      permission: "campfirerpg.class.warrior"
      description: "&7Defensa y fuerza para primera linea."
      global-effects:
        resistance:
          type: RESISTANCE
          amplifier: 0
          duration-ticks: 100
      normal-effects:
        strength:
          type: STRENGTH
          amplifier: 0
          duration-ticks: 100
      soul-effects:
        strength:
          type: STRENGTH
          amplifier: 1
          duration-ticks: 100

    mage:
      display-name: "&bMage"
      permission: "campfirerpg.class.mage"
      description: "&7Vision, energia y bonus mistico."
      global-effects:
        night_vision:
          type: NIGHT_VISION
          amplifier: 0
          duration-ticks: 160
      normal-effects:
        haste:
          type: HASTE
          amplifier: 0
          duration-ticks: 100
      soul-effects:
        fire_resistance:
          type: FIRE_RESISTANCE
          amplifier: 0
          duration-ticks: 140

    ranger:
      display-name: "&aRanger"
      permission: "campfirerpg.class.ranger"
      description: "&7Movilidad y precision."
      global-effects:
        jump_boost:
          type: JUMP_BOOST
          amplifier: 0
          duration-ticks: 100
      normal-effects:
        speed:
          type: SPEED
          amplifier: 1
          duration-ticks: 100
      soul-effects:
        invisibility:
          type: INVISIBILITY
          amplifier: 0
          duration-ticks: 60

clan-features:
  # Feature extra opcional. Si no hay plugin de clanes no bloquea
  # el funcionamiento base del plugin.
  enabled: true
  hero-bonus-require-same-clan: false

  leader-bonus:
    enabled: true
    effects:
      resistance:
        type: RESISTANCE
        amplifier: 0
        duration-ticks: 100

  size-bonus:
    enabled: true
    minimum-members: 4
    effects:
      haste:
        type: HASTE
        amplifier: 0
        duration-ticks: 100

  territory:
    restrict-to-own-clan-territory: false
    bonus-in-own-territory: true
    effects:
      luck:
        type: LUCK
        amplifier: 0
        duration-ticks: 100

debug:
  enabled-by-default: false
  log-interval-ticks: 1200

messages:
  actionbar:
    normal: "&6Campfire Rest &7- warm support aura"
    soul: "&bSoul Campfire &7- stronger support aura"

  chat:
    rested: "&6The campfire leaves you well rested."
    hero: "&dYour group awakened the campfire bonus."

  system:
    no-permission: "&cNo tienes permiso."
    player-only: "&cSolo un jugador puede usar esta opcion."
    debug-enabled: "&aDebug activado."
    debug-disabled: "&cDebug desactivado."
    gui-opened: "&aPanel de administracion abierto."

# Perfiles de campfire.
# Puedes tener varios, pero por defecto el plugin usa normal y soul.
profiles:
  normal:
    material: CAMPFIRE
    radius: 7.0
    feed-players: true

    effects:
      regeneration:
        type: REGENERATION
        amplifier: 0
        duration-ticks: 100
      resistance:
        type: RESISTANCE
        amplifier: 0
        duration-ticks: 100

    bonus-effects:
      speed:
        type: SPEED
        amplifier: 0
        duration-ticks: 100

    rested-effects:
      absorption:
        type: ABSORPTION
        amplifier: 0
        duration-ticks: 1800

    ward-effects:
      weakness:
        type: WEAKNESS
        amplifier: 0
        duration-ticks: 80

  soul:
    material: SOUL_CAMPFIRE
    radius: 8.5
    feed-players: true

    effects:
      regeneration:
        type: REGENERATION
        amplifier: 0
        duration-ticks: 100
      resistance:
        type: RESISTANCE
        amplifier: 0
        duration-ticks: 100
      night_vision:
        type: NIGHT_VISION
        amplifier: 0
        duration-ticks: 160
      speed:
        type: SPEED
        amplifier: 0
        duration-ticks: 100

    bonus-effects:
      hero_resistance:
        type: RESISTANCE
        amplifier: 0
        duration-ticks: 100

    rested-effects:
      absorption:
        type: ABSORPTION
        amplifier: 0
        duration-ticks: 2400
      fire_resistance:
        type: FIRE_RESISTANCE
        amplifier: 0
        duration-ticks: 2400

    ward-effects:
      weakness:
        type: WEAKNESS
        amplifier: 0
        duration-ticks: 100
      slowness:
        type: SLOWNESS
        amplifier: 0
        duration-ticks: 100
